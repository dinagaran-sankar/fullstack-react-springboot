<style>
    h1{
        background-color: red;
         /* display: block; default */
         display: inline;
    }
    p{
        background-color: brown;
        display: inline-block;
        width: 200px;
        height: 300px;
    }
    span{
        background-color: blue;
        display: block;
    }
</style>

<div>
    <h1>Hello</h1>
    <p>Bye</p>
    <span> how r you </span>
</div>

<!-- display - block  take space entire window
 A block-level element ALWAYS starts on a new line and takes up the full width available 
display - inline width and height wont work it will take text space only.
An inline element DOES NOT start on a new line and only takes up as much width as necessary
display - inline-block width and height will work & it will take text space only 
Displays an element as an inline-level block container. 
The element itself is formatted as an inline element, 
but you can apply height, width, padding, and margin values
-->
